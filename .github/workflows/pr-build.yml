name: pr-build

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            cache_path: linux
          - name: darwin
            os: macos-latest
            cache_path: darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Nix
        uses: nixbuild/nix-quick-install-action@v34

      - name: Configure repository cache
        env:
          CACHE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ matrix.cache_path }}
          CACHE_KEY: ${{ vars.NIX_CACHE_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.config/nix
          printf '%s\n' "extra-substituters = $CACHE_URL" >> ~/.config/nix/nix.conf
          if [ -n "$CACHE_KEY" ]; then
            printf '%s\n' "extra-trusted-public-keys = $CACHE_KEY" >> ~/.config/nix/nix.conf
          fi

      - name: Build Nix output
        run: nix build .#default --print-build-logs
