name: nix-cache

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            cache_path: linux
            release_tag: nix-cache-linux
          - name: darwin
            os: macos-latest
            cache_path: darwin
            release_tag: nix-cache-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Nix
        uses: nixbuild/nix-quick-install-action@v34

      - name: Configure repository cache
        env:
          CACHE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ matrix.cache_path }}
          CACHE_KEY: ${{ vars.NIX_CACHE_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.config/nix
          printf '%s\n' "extra-substituters = $CACHE_URL" >> ~/.config/nix/nix.conf
          if [ -n "$CACHE_KEY" ]; then
            printf '%s\n' "extra-trusted-public-keys = $CACHE_KEY" >> ~/.config/nix/nix.conf
          fi

      - name: Build Nix output
        run: nix build .#default --print-out-paths | tee /tmp/static-nix-cache-paths.txt

      - name: Save Nix binary
        uses: adampoit/static-nix-cache/save@986776d29acbd428597c314fa0a02abebd403cea
        with:
          paths-file: /tmp/static-nix-cache-paths.txt
          name: ${{ matrix.name }}
          signing-key: ${{ secrets.NIX_CACHE_SIGNING_KEY }}

  publish:
    name: publish nix cache
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    steps:
      - name: Setup Nix
        uses: nixbuild/nix-quick-install-action@v34

      - name: Generate Linux cache site
        uses: adampoit/static-nix-cache/deploy@986776d29acbd428597c314fa0a02abebd403cea
        with:
          artifact-pattern: static-nix-cache-linux
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-release-tag: nix-cache-linux
          static: ./site/linux

      - name: Generate Darwin cache site
        uses: adampoit/static-nix-cache/deploy@986776d29acbd428597c314fa0a02abebd403cea
        with:
          artifact-pattern: static-nix-cache-darwin
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-release-tag: nix-cache-darwin
          static: ./site/darwin

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy GitHub Pages site
        id: pages
        uses: actions/deploy-pages@v4
