name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  packages:
    name: compute package list
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
      release-tags: ${{ steps.packages.outputs.release-tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compute packages
        id: packages
        run: |
          set -euo pipefail
          mapfile -t packages < <(find pkgs -mindepth 2 -maxdepth 2 -name default.nix -exec dirname {} \; | while IFS= read -r dir; do basename "$dir"; done | sort)
          packages_json=$(jq -cn --args '$ARGS.positional' -- "${packages[@]}")
          release_tags=$(for platform in linux darwin; do for package in "${packages[@]}"; do printf 'nix-cache-%s-%s\n' "$platform" "$package"; done; done | paste -sd, -)
          printf 'packages=%s\n' "$packages_json" >> "$GITHUB_OUTPUT"
          printf 'release-tags=%s\n' "$release_tags" >> "$GITHUB_OUTPUT"

  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    needs: packages
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
          - name: darwin
            os: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Nix
        uses: nixbuild/nix-quick-install-action@v34

      - name: Configure repository cache
        env:
          CACHE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          CACHE_KEY: ${{ vars.NIX_CACHE_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.config/nix
          printf '%s\n' "extra-substituters = $CACHE_URL" >> ~/.config/nix/nix.conf
          if [ -n "$CACHE_KEY" ]; then
            printf '%s\n' "extra-trusted-public-keys = $CACHE_KEY" >> ~/.config/nix/nix.conf
          fi

      - name: Build packages
        env:
          PACKAGES: ${{ needs.packages.outputs.packages }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/static-nix-cache-paths

          jq -r '.[]' <<< "$PACKAGES" | while IFS= read -r package; do
            echo "::group::Build $package"
            nix build ".#$package" --print-build-logs --print-out-paths | tee "/tmp/static-nix-cache-paths/$package.txt"
            echo "::endgroup::"
          done

      - name: Save package cache artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: adampoit/static-nix-cache/save@master
        with:
          name: ${{ matrix.name }}
          paths-dir: /tmp/static-nix-cache-paths
          signing-key: ${{ secrets.NIX_CACHE_SIGNING_KEY }}

  publish_nix_cache:
    name: publish nix cache site
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - packages
      - build
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    steps:
      - name: Setup Nix
        uses: nixbuild/nix-quick-install-action@v34

      - name: Generate merged cache site
        uses: adampoit/static-nix-cache/deploy@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-release-tags: ${{ needs.packages.outputs.release-tags }}
          static: ./site

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy GitHub Pages site
        id: pages
        uses: actions/deploy-pages@v4
