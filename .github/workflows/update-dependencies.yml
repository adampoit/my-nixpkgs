name: update-dependencies

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Nix
        uses: nixbuild/nix-quick-install-action@v34

      - name: Refresh nixpkgs input
        run: nix flake lock --update-input nixpkgs

      - name: Configure repository cache
        env:
          CACHE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/linux
          CACHE_KEY: ${{ vars.NIX_CACHE_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.config/nix
          printf '%s\n' "extra-substituters = $CACHE_URL" >> ~/.config/nix/nix.conf
          if [ -n "$CACHE_KEY" ]; then
            printf '%s\n' "extra-trusted-public-keys = $CACHE_KEY" >> ~/.config/nix/nix.conf
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Refresh managed dependencies
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          chmod +x ./scripts/update-dependencies.cs
          ./scripts/update-dependencies.cs

      - name: Format dependency file
        run: nix run nixpkgs#alejandra -- pkgs/dependencies.nix

      - name: Sync upstream package issues
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_ASSIGNEE: adampoit
        run: |
          set -euo pipefail
          chmod +x ./scripts/sync-upstream-issues.cs
          ./scripts/sync-upstream-issues.cs

      - name: Check for dependency metadata changes
        id: dependency-changes
        run: |
          set -euo pipefail
          if git diff --quiet --exit-code -- pkgs/dependencies.nix; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        id: create-pull-request
        if: steps.dependency-changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.CREATE_PR_TOKEN }}
          add-paths: |
            flake.lock
            pkgs/dependencies.nix
          branch: automation/update-dependencies
          delete-branch: true
          commit-message: Update managed dependencies
          title: Update managed dependencies
          body: |
            ## Summary
            - refresh the `nixpkgs` flake input
            - run `./scripts/update-dependencies.cs`
            - refresh pinned package metadata in `pkgs/dependencies.nix` and `flake.lock`
          labels: dependencies

      - name: Enable pull request auto-merge
        if: steps.create-pull-request.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.CREATE_PR_TOKEN }}
        run: gh pr merge --auto --squash "${{ steps.create-pull-request.outputs.pull-request-url }}"
