name: update-dependencies

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Nix
        uses: nixbuild/nix-quick-install-action@v34

      - name: Configure repository cache
        env:
          CACHE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/linux
          CACHE_KEY: ${{ vars.NIX_CACHE_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.config/nix
          printf '%s\n' "extra-substituters = $CACHE_URL" >> ~/.config/nix/nix.conf
          if [ -n "$CACHE_KEY" ]; then
            printf '%s\n' "extra-trusted-public-keys = $CACHE_KEY" >> ~/.config/nix/nix.conf
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Refresh managed dependencies
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          chmod +x ./scripts/update-dependencies.cs
          ./scripts/update-dependencies.cs

      - name: Format dependency file
        run: nix run nixpkgs#alejandra -- pkgs/dependencies.nix

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          branch: automation/update-dependencies
          delete-branch: true
          commit-message: Update managed dependencies
          title: Update managed dependencies
          body: |
            ## Summary
            - run `./scripts/update-dependencies.cs`
            - refresh pinned package metadata in `pkgs/dependencies.nix`
          labels: dependencies
